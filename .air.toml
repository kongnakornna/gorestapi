# Config file for Air in TOML format (Windows: gorestapi)
root = "."
tmp_dir = "tmp"  # use relative path; easier on Windows

[build]
# Build to a Windows .exe file
cmd = "go build -o ./tmp/main.exe ."
# Point to the built .exe
bin = "./tmp/main.exe"
# Optional: add environment variables when running
full_bin = "APP_ENV=dev APP_USER=air ./tmp/main.exe"
# Watch these extensions
include_ext = ["go", "tpl", "tmpl", "html", "yml"]
# Ignore these directories
exclude_dir = ["assets", "tmp", "vendor", "frontend/node_modules"]
# Not needed here, but allowed if you want to narrow watches
include_dir = []
# Exclude specific files
exclude_file = []
# Wait a bit before rebuilding if files change rapidly
delay = 1000  # ms
# Stop the old binary on build errors
stop_on_error = true
# Air build error log (placed inside tmp_dir)
log = "air_errors.log"

[log]
# Show timestamp in logs? (optional)
time = false

[color]
# Colors for each part of the output
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Clean the tmp directory on exit
clean_on_exit = true

[env]
APP_ENV = "dev"
APP_USER = "air"