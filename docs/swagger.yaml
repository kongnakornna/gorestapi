basePath: /api
definitions:
  httpErrors.ErrResponse:
    properties:
      msg:
        description: application-level error message
        example: not found user
        type: string
      status:
        description: http response status code
        example: 404
        type: integer
      statusText:
        description: user-level status message
        example: not_found
        type: string
    type: object
  icmongolang_internal_monitoring_handler.HealthResponse:
    properties:
      status:
        type: string
      timestamp:
        type: string
      uptime:
        type: string
    type: object
  icmongolang_internal_users_presenter.ForgotPassword:
    properties:
      email:
        example: kongnakornna@gmail.com
        type: string
    required:
    - email
    type: object
  icmongolang_internal_users_presenter.PublicKey:
    properties:
      public_key_access_token:
        type: string
      public_key_refresh_token:
        type: string
    type: object
  icmongolang_internal_users_presenter.ResetPassword:
    properties:
      confirm_password:
        example: password
        minLength: 8
        type: string
      new_password:
        example: password
        minLength: 8
        type: string
    required:
    - confirm_password
    - new_password
    type: object
  icmongolang_internal_users_presenter.Token:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  icmongolang_internal_users_presenter.UserCreate:
    properties:
      confirm_password:
        example: password
        minLength: 8
        type: string
      email:
        example: kongnakornna@gmail.com
        type: string
      firstname:
        example: Kongnakorn
        type: string
      fullname:
        example: Kongnakorn Jantakun
        type: string
      lastname:
        example: Jantakun
        type: string
      line_id:
        example: kongnakorn_line
        type: string
      location_id:
        example: loc_001
        type: string
      mobile_number:
        example: "0812345678"
        type: string
      password:
        example: password
        minLength: 8
        type: string
      phone_number:
        example: "021234567"
        type: string
      role_id:
        example: 2
        minimum: 1
        type: integer
    required:
    - confirm_password
    - email
    - password
    - role_id
    type: object
  icmongolang_internal_users_presenter.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      firstname:
        type: string
      fullname:
        type: string
      id:
        type: string
      is_superuser:
        type: boolean
      lastname:
        type: string
      line_id:
        type: string
      location_id:
        type: string
      mobile_number:
        type: string
      phone_number:
        type: string
      role_id:
        type: integer
      status:
        description: 1 active, 0 inactive
        type: integer
      updated_at:
        type: string
      verified:
        type: boolean
    type: object
  icmongolang_internal_users_presenter.UserUpdate:
    properties:
      firstname:
        type: string
      fullname:
        type: string
      lastname:
        type: string
      line_id:
        type: string
      location_id:
        type: string
      mobile_number:
        type: string
      phone_number:
        type: string
    type: object
  icmongolang_internal_users_presenter.UserUpdatePassword:
    properties:
      confirm_password:
        minLength: 8
        type: string
      new_password:
        minLength: 8
        type: string
      old_password:
        minLength: 8
        type: string
    required:
    - confirm_password
    - new_password
    - old_password
    type: object
  icmongolang_knowledge_dev_monitoring_modules_internal_monitoring_handler.HealthResponse:
    properties:
      status:
        type: string
      timestamp:
        type: string
      uptime:
        type: string
    type: object
  presenter.ItemCreate:
    properties:
      description:
        example: item description
        type: string
      title:
        example: item title
        type: string
    required:
    - description
    - title
    type: object
  presenter.ItemResponse:
    properties:
      description:
        type: string
      id:
        type: string
      owner_id:
        type: string
      title:
        type: string
    type: object
  presenter.ItemUpdate:
    properties:
      description:
        example: item description
        type: string
      title:
        example: item title
        type: string
    type: object
  responses.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/httpErrors.ErrResponse'
      is_success:
        example: false
        type: boolean
    type: object
  responses.SuccessResponse-array_icmongolang_internal_users_presenter_UserResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/icmongolang_internal_users_presenter.UserResponse'
        type: array
      is_success:
        example: true
        type: boolean
    type: object
  responses.SuccessResponse-array_presenter_ItemResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/presenter.ItemResponse'
        type: array
      is_success:
        example: true
        type: boolean
    type: object
  responses.SuccessResponse-icmongolang_internal_users_presenter_UserResponse:
    properties:
      data:
        $ref: '#/definitions/icmongolang_internal_users_presenter.UserResponse'
      is_success:
        example: true
        type: boolean
    type: object
  responses.SuccessResponse-presenter_ItemResponse:
    properties:
      data:
        $ref: '#/definitions/presenter.ItemResponse'
      is_success:
        example: true
        type: boolean
    type: object
info:
  contact: {}
  description: API for ICMON project
  title: Go Rest API
  version: "1.0"
paths:
  /auth/forgotpassword:
    post:
      consumes:
      - application/json
      description: Forgot password, code will send to email.
      parameters:
      - description: Forgot Password
        in: body
        name: forgotPassword
        required: true
        schema:
          $ref: '#/definitions/icmongolang_internal_users_presenter.ForgotPassword'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Forgot password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - multipart/form-data
      description: Sign in, get access token for future requests.
      parameters:
      - description: email
        in: formData
        name: username
        required: true
        type: string
      - description: password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/icmongolang_internal_users_presenter.Token'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Sign In
      tags:
      - auth
  /auth/logout:
    get:
      consumes:
      - application/json
      description: Logout, remove current refresh token in db.
      parameters:
      - description: Authentication header
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Logout
      tags:
      - auth
  /auth/logoutall:
    get:
      consumes:
      - application/json
      description: Logout all session of this user.
      parameters:
      - description: Authentication header
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Logout all session
      tags:
      - auth
  /auth/publickey:
    get:
      consumes:
      - application/json
      description: Get rsa public key to decode token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/icmongolang_internal_users_presenter.PublicKey'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Get public key
      tags:
      - auth
  /auth/refresh:
    get:
      consumes:
      - application/json
      description: Get new access token from refresh token.
      parameters:
      - description: Authentication header
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/icmongolang_internal_users_presenter.Token'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Refresh token
      tags:
      - auth
  /auth/resetpassword:
    patch:
      consumes:
      - application/json
      description: Reset Password, using code from email.
      parameters:
      - description: code
        format: code
        in: query
        name: code
        required: true
        type: string
      - description: Reset Password
        in: body
        name: resetPassword
        required: true
        schema:
          $ref: '#/definitions/icmongolang_internal_users_presenter.ResetPassword'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Reset Password
      tags:
      - auth
  /auth/verifyemail:
    get:
      consumes:
      - application/json
      description: Verify user using code from email.
      parameters:
      - description: offset
        format: code
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Verify user
      tags:
      - auth
  /item:
    get:
      consumes:
