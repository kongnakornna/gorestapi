        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      security:
      - OAuth2Password: []
      summary: Delete item
      tags:
      - items
    get:
      consumes:
      - application/json
      description: Get item by ID.
      parameters:
      - description: Item Id
        in: path
        name: id
        required: true
        type: string
      produces:
