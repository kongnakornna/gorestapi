server:
  AppVersion: 1.0.0
  Port: 8088
  Mode: Development
  ProcessTimeout: 60
  ReadTimeout: 5
  WriteTimeout: 5
  MigrateOnStart: true

jwt:
  SecretKey: 111111111111
  Issuer: golang-app
  AccessTokenExpireDuration: 15
  AccessTokenPrivateKey: 111111111111==
  AccessTokenPublicKey: 111111111111==
  RefreshTokenExpireDuration: 111111111111
  RefreshTokenPrivateKey: 111111111111==
  RefreshTokenPublicKey: 111111111111==

firstSuperUser:
  Email: root@gmail.com
  Name: root
  Password: root_password

logger:
  Encoding: console
  Level: debug

postgres:
  Host: localhost
  Port: 5432
  User: postgres
  Password: postgres
  Dbname: db

redis:
  Addr: localhost:6379
  Password:
  Db: 0
  MinIdleConns: 200
  PoolSize: 12000
  PoolTimeout: 240

taskRedis:
  Addr: localhost:6379
  Db: 1

email:
  From: kongnakornna@gamil.com
  Name: Go restapi
  Link: https://icmongolang
  LogoLink: https://media.vov.vn/sites/default/files/styles/front_large/public/2022-12/nhung-dieu-thu-vi-ve-logo-apple-ma-ban-chua-biet-4.png
  Copyright: Copyright © 2026 example inc. All rights reserved.
  VerificationSubject: Your account verification code
  ResetSubject: Your account password reset token

smtpEmail:
  Host:  smtp.icmon.io
  Port: 2525
  User: icmon
  Password: icmon
  UseTls: true
  UseSsl: false

monitoring:
  enabled: true
  metrics_enabled: true
  tracing_enabled: true
  sentry_enabled: true
  alert_enabled: true
  system_metrics_enabled: true
  sentry_dsn: "https://your-dsn@sentry.io/project-id"
  jaeger_endpoint: "localhost:4317"
  alert_smtp_host: "smtp.gmail.com"
  alert_smtp_port: "465"
  alert_smtp_user: "your-email@gmail.com"
  alert_smtp_pass: "your-app-password"
  alert_from_email: "alert@icmongolang.com"
  alert_to_email: "admin@icmongolang.com"
